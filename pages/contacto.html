<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/estilos.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <div class="contact-card shadow border-0 p-4 p-md-5">
                    <h2 class="text-center mb-4 fw-bold">Contactate con <span class="text-turquesa">Nosotros</span></h2>

                    <form id="contactForm" novalidate>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nombre</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Ej: Cristian" required>
                                <div class="invalid-feedback">Solo letras (mín. 3).</div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Apellido</label>
                                <input type="text" class="form-control" id="apellido" placeholder="Ej: Condorí"
                                    required>
                                <div class="invalid-feedback">Solo letras (mín. 3).</div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com"
                                    required>
                                <div class="invalid-feedback">Ingresá un email válido.</div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Teléfono</label>
                                <input type="tel" class="form-control" id="tel" placeholder="388 1234567" required>
                                <div class="invalid-feedback">Ingresá un número válido.</div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">¿Qué región de Jujuy querés visitar?</label>
                                <select class="form-select" id="region" required>
                                    <option value="" disabled selected>Seleccioná una región</option>
                                    <option value="quebrada">Quebrada de Humahuaca</option>
                                    <option value="puna">La Puna</option>
                                    <option value="yungas">Las Yungas</option>
                                    <option value="valles">Los Valles</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Tu consulta</label>
                                <textarea class="form-control" id="mensaje" rows="4"
                                    placeholder="Contanos más sobre tu viaje..." required></textarea>
                                <div class="d-flex justify-content-between mt-1">
                                    <div class="invalid-feedback">El mensaje no puede estar vacío.</div>
                                    <small class="text-muted ms-auto" id="charCount">0 / 200 caracteres</small>
                                </div>
                            </div>

                            <div class="col-12 text-center mt-4">
                                <button type="submit" class="btn btn-turquesa btn-lg px-5 w-100" id="btnSubmit">
                                    <span id="btnText">Enviar Mensaje</span>
                                    <div class="spinner-border spinner-border-sm d-none ms-2" id="btnSpinner"
                                        role="status"></div>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-5">
                    <i class="bi bi-check-circle-fill text-success display-1 mb-3"></i>
                    <h3 class="fw-bold">¡Mensaje Enviado!</h3>
                    <p class="text-muted">Gracias por contactarnos. Te responderemos a la brevedad.</p>
                    <button type="button" class="btn btn-dark px-4" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="https://cdn-script.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="../js/scripts.js"></script>
    <script>
        // Esta función carga los componentes externos
        $(function () {
            $("#header-placeholder").load("../components/header.html");
            $("#footer-placeholder").load("../components/footer.html");
        });
    </script>
</body>

</html>
